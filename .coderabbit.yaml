language: en-US
reviews:
  profile: assertive
  request_changes_workflow: true
  auto_review:
    enabled: true
  path_instructions:
    - path: "scripts/**/*.sh"
      instructions: |
        Review against CODE_PRINCIPLES.md. Focus on:
        - SRP: does each function do one thing?
        - Error handling: are all curl calls checked via check_http_status?
        - JSON safety: all payloads built with jq, never string interpolation?
        - No magic values: all literals as readonly constants in _lib.sh?
        - set -euo pipefail present at top of every script?
        - API key never logged or echoed?
    - path: "scripts/_lib.sh"
      instructions: |
        This is the shared library sourced by all scripts. Review:
        - Function interfaces: are they simple with complex implementation hidden?
        - Atomic writes: do file operations use mktemp + mv pattern?
        - Error messages: do they go to stderr with clear context?
        - No global state mutation except HTTP_CODE (documented exception)
    - path: "tests/**/*.bats"
      instructions: |
        Tests follow Arrange-Act-Assert. Each test covers one behavior.
        Test names describe expected behavior, not implementation details.
        curl must be mocked — no real API calls in tests.
  tools:
    shellcheck:
      enabled: true
  custom_checks:
    - name: "Code Quality Hard Rules"
      mode: "warning"
      instructions: |
        Check changed files for these violations and report with specific file:line references:
        1. Functions longer than 40 lines — suggest decomposition
        2. Magic numbers/strings not defined as named constants (ignore 0, 1, true, false, '')
        3. Functions with more than 5 parameters — suggest restructuring
        4. Nesting deeper than 3 levels — suggest early returns or extraction
        5. curl calls without corresponding check_http_status
        6. JSON built via string interpolation instead of jq
        7. API key value logged, echoed, or written to file
        8. Missing set -euo pipefail at script top
        9. Duplicated logic blocks (>5 similar lines in multiple locations)
        10. Generic variable names (data, info, item, temp, result) in scopes longer than 3 lines
        Pass if no violations found. Warn with specific file:line references for each violation.
knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "CODE_PRINCIPLES.md"
  learnings:
    scope: auto
chat:
  auto_reply: true

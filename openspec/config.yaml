schema: spec-driven

context: |
  Project: altfins-skill
  Overview: Claude Code skill wrapping the altFINS Crypto Data & Analytics API.
    Pure bash scripts (curl + jq) providing AI agents with access to 150+ technical
    indicators, 130+ trading signals, OHLCV data, news summaries, and expert
    technical analysis across 2200+ crypto assets.
  Stack: Bash 5+, curl, jq. No Python, no Node.
  API: altFINS REST API v2 (https://altfins.com/api/v2/public). Auth: X-API-KEY header.
    17 endpoints across 7 categories: Screener, OHLC, Analytics, Technical Analysis,
    Signals Feed, News Summary, Common Enums. All POST endpoints paginated.
  Architecture: scripts/_lib.sh shared library + one script per API domain.
    Scripts output JSON to stdout, errors to stderr. Exit 0 on success, 1 on error.
  Testing: bats-core with mocked curl responses. No real API calls in CI.
  Distribution: SKILL.md (Agent Skills standard) + skills/ directory for Claude Desktop.
  Security: Single API endpoint, single credential, writes only to ~/.config/altfins-skill/.

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then format
  design:
    - Include sequence diagrams for complex flows
    - Prefer deep modules — simple interface hiding complex implementation
    - Design it twice — consider at least two approaches before committing
  tasks:
    - Each task < 2 hours
    - Include acceptance criteria
    - Specify test files to create/update
    - Include applicable code quality constraints from CODE_PRINCIPLES.md
    - Specify error handling strategy for the task's scope
  code:
    - Functions do one thing — if it needs "and" in its description, split it
    - No magic values — all literals that aren't self-evident must be named constants
    - Prefer deep modules — simple interface, complex implementation hidden
    - Error handling is mandatory for all curl calls and jq parsing
    - Names reveal intent — no abbreviations, no generic names
    - Maximum 3 levels of nesting — use early returns and guard clauses
    - Comments explain WHY, not WHAT
    - No duplicated logic — extract shared behavior into _lib.sh
    - KISS — simplest solution that works
    - YAGNI — only build what the task requires
    - JSON built with jq only — never string interpolation
    - API key never logged or echoed
